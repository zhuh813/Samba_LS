#### 檔案 2：`smb.conf`（Samba 核心設定檔）
* **GitHub 欄位輸入檔名**：`smb.conf`（你可以直接放在儲存庫根目錄，或先輸入 `config/smb.conf` 建立資料夾）
* **複製下方框內所有文字貼上**：

```ini
# ==========================================
# Samba Server Multi-Permission Lab Config
# ==========================================

[global]
   workgroup = WORKGROUP
   server string = Samba Server Lab
   server role = standalone server
   log file = /var/log/samba/log.%m
   max log size = 1000
   logging = file
   panic action = /usr/share/samba/panic-action %d

   # 允許匿名存取（對應 Ubuntu 24.04 的 guest 設定）
   map to guest = bad user
   usershare allow guests = yes

# 1. 匿名唯讀：所有人可看，不可改刪
[shares]
   comment = Common Public Shares (Read Only)
   path = /var/shares
   browseable = yes
   read only = yes
   guest ok = yes

# 2. 匿名讀寫：自由丟檔，互相傳輸
[update]
   comment = Anonymous Upload and Update Area
   path = /var/update
   browseable = yes
   writable = yes
   guest ok = yes
   create mask = 0777
   directory mask = 0777

# 3. 密碼私人驗證：特定帳號輸入密碼才可進
[secret]
   comment = Amy Private Secret Directory
   path = /var/secret
   browseable = yes
   writable = yes
   guest ok = no
   valid users = amy
